server {
    listen 80;
    server_name postboy.im.pro www.postboy.im.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://postboy.im.pro$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.postboy.im.pro;

    ssl_certificate         /etc/nginx/ssl/le-crt.pem;
    ssl_certificate_key     /etc/nginx/ssl/le-key.pem;
    ssl_trusted_certificate /etc/nginx/ssl/le-chain-crt.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://postboy.im.pro$request_uri;
}

server {
    listen 443 ssl http2;
    server_name postboy.im.pro;

    ssl_certificate         /etc/nginx/ssl/le-crt.pem;
    ssl_certificate_key     /etc/nginx/ssl/le-key.pem;
    ssl_trusted_certificate /etc/nginx/ssl/le-chain-crt.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    proxy_read_timeout 90;
    proxy_connect_timeout 90;
    proxy_send_timeout 90;
    client_max_body_size 50m;

    client_header_buffer_size 64k;
    large_client_header_buffers 8 128k;

    merge_slashes off;

    location / {
        limit_except GET HEAD POST PUT DELETE PATCH OPTIONS {
            deny all;
        }

        proxy_pass http://postboy:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;

        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";

    }

    location /static/ {
        alias /nginx/static/;
        limit_except GET HEAD {
            deny all;
        }

        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}